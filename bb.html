<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Throw Game</title>
    <link rel="stylesheet" href="bb.css">
</head>
<body>

<div class="game">
    <h1>🏀 Basketball Throw Game</h1>

    <h2>Score: <span id="score">0</span></h2>

    <div class="court">

        <!-- Hoop -->
        <div class="hoop">
            <div class="rim"></div>
            <div class="net"></div>
        </div>

        <!-- Ball -->
        <div class="ball" id="ball">🏀</div>

    </div>

    <button id="throwBtn">Throw Ball</button>

    <p id="message">Click the button to throw!</p>

</div>

<script src="bb.js"></script>

</body>
</html>
