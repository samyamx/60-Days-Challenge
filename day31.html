<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="day31.css">
</head>
<body>

<div class="container">

    <h1>Task Manager</h1>

    <div class="input-box">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task"
        >

        <button id="addBtn">
            Add
        </button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
        <p>Total: <span id="total">0</span></p>
        <p>Completed: <span id="completed">0</span></p>
        <p>Remaining: <span id="remaining">0</span></p>
    </div>

</div>

<script src="day31.js"></script>

</body>
</html>
